spring.application.name=backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/boda}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.threads.virtual.enabled=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.seed.demo-enabled=${APP_SEED_DEMO_ENABLED:true}
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.session-secret=${ADMIN_SESSION_SECRET:change-this-secret}
app.admin.session-minutes=${ADMIN_SESSION_MINUTES:480}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.partner-a.username=${APP_PARTNER_A_USERNAME:esposo}
app.partner-a.password=${APP_PARTNER_A_PASSWORD:cambiar-esposo}
app.partner-a.display-name=${APP_PARTNER_A_DISPLAY_NAME:Daniel}
app.partner-b.username=${APP_PARTNER_B_USERNAME:esposa}
app.partner-b.password=${APP_PARTNER_B_PASSWORD:cambiar-esposa}
app.partner-b.display-name=${APP_PARTNER_B_DISPLAY_NAME:Ana}
